name: Daily Repository Update

on:
  schedule:
    - cron: '17 3 * * *'   # Runs daily at 03:17 UTC
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "23f2004250@ds.study.iitm.ac.in"

      - name: Update timestamp file - 23f2004250@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date -u)" >> daily-log.txt

      - name: Commit and Push Changes
        run: |
          git add daily-log.txt
          git commit -m "Automated daily update - $(date -u)" || echo "No changes to commit"
          git push
